# Channel tool + LLM configuration
# Built-in tools (web_search, run_python, search_channel_history) are always available.

# Per-channel LLM override — leave commented to use the global LLM_MODEL
# [llm]
# model = "gpt-4o"                          # use OpenAI for this channel
# model = "claude-sonnet-4-6"               # use Anthropic
# model = "gemini/gemini-2.0-flash"         # use Gemini
# model = "groq/llama-3.3-70b-versatile"   # use Groq

