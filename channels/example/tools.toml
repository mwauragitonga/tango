# Per-channel tools. Built-ins (web_search, run_python, …) are always on.
# MCP servers use stdio: command + args (see examples/mcp/).

# Optional per-channel model override:
# [llm]
# model = "openai/kimi-k2.7-code"

[[mcp_server]]
name = "org_kb"
command = "/opt/apps/open-claude-tag/.venv/bin/python"
args = ["/opt/apps/open-claude-tag/examples/mcp/org_kb_server.py"]
allowed_tools = ["org_lookup", "list_org_docs"]

