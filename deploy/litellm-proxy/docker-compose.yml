# Tango LiteLLM Proxy — Contabo localhost proving ground / SaaS shared stack.
# Docs: ../../docs/LITELLM-PROXY.md
#
# Before first start:
#   1. Copy .env.example → .env and set strong secrets (no defaults in prod)
#   2. Set LITELLM_SALT_KEY once; never rotate after credentials are stored
#   3. Pin image digest below (replace TAG)
#   4. Run migrate job once, then start proxy with DISABLE_SCHEMA_UPDATE=true on replicas

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - litellm_pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  litellm-migrate:
    # Pin a tested digest in production, e.g. ghcr.io/berriai/litellm@sha256:...
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:v1.74.3-stable}
    profiles: ["migrate"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?set LITELLM_SALT_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:v1.74.3-stable}
    ports:
      - "127.0.0.1:4000:4000"
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?set LITELLM_SALT_KEY}
      DISABLE_SCHEMA_UPDATE: "true"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional Prometheus scrape target sidecar notes — wire your existing stack
  # to :4000/metrics when enabled in litellm_settings.

volumes:
  litellm_pg:
